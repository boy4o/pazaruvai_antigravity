<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 48" fill="none">
  <defs>
    <linearGradient id="gShield" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#27AE60"/>
      <stop offset="100%" stop-color="#145A3A"/>
    </linearGradient>
    <linearGradient id="gAccent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7C948"/>
      <stop offset="100%" stop-color="#F39C12"/>
    </linearGradient>
  </defs>

  <!-- Shield / Badge shape -->
  <path d="M6 6 h28 a4 4 0 0 1 4 4 v20 a12 12 0 0 1 -6 10.4 l-12 7 -12 -7 A12 12 0 0 1 2 30.4 V10 A4 4 0 0 1 6 6z" fill="url(#gShield)"/>

  <!-- Price tag / comparison arrows -->
  <path d="M14 16 l6 -5 l6 5" stroke="url(#gAccent)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M26 30 l-6 5 l-6 -5" stroke="url(#gAccent)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Checkmark in center -->
  <circle cx="20" cy="23" r="6.5" fill="rgba(255,255,255,.15)"/>
  <path d="M16.5 23 l2.5 2.5 l5 -5" stroke="#fff" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Text: pazaruvai -->
  <text x="48" y="22" font-family="Inter,system-ui,-apple-system,sans-serif" font-size="19" font-weight="800" fill="#1A1A2E" letter-spacing="-0.3">pazaruvai</text>

  <!-- Text: .info -->
  <text x="48" y="38" font-family="Inter,system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#1B6B4A" letter-spacing="2">.INFO</text>

  <!-- Accent dot -->
  <circle cx="48" cy="38" r="2" fill="#F39C12"/>
</svg>
