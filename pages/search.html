<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Търсене — Pazaruvai.info</title>
    <meta name="description" content="Търси и сравни цени на продукти от Lidl, Kaufland, Billa и Фантастико.">
    <link rel="canonical" href="https://pazaruvai.info/pages/search.html">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="site-header"></div>
    <main>
        <div class="container">
            <nav class="breadcrumb"><a href="../index.html">Начало</a><span class="sep">›</span><span>Търсене</span></nav>
            <h1 id="searchTitle" style="font-size:1.6rem;font-weight:800;margin-bottom:20px">Резултати от търсене</h1>
            <div class="toolbar" style="margin-bottom:20px">
                <div class="toolbar-left">
                    <span class="count-label">Намерени:</span>
                    <span class="count-num" id="resultCount">0</span>
                </div>
                <div class="toolbar-right">
                    <select id="storeFilter"><option value="all">Всички магазини</option><option value="lidl">Lidl</option><option value="kaufland">Kaufland</option><option value="billa">Billa</option><option value="fantastico">Фантастико</option></select>
                    <select id="sortSelect"><option value="price_asc">Цена ↑</option><option value="price_desc">Цена ↓</option><option value="name_asc">Име А-Я</option></select>
                </div>
            </div>
            <div id="searchResults" class="products-grid">
                <div class="loading-state"><div class="spinner"></div><p>Търсене...</p></div>
            </div>
        </div>
    </main>
    <div id="site-footer"></div>
    <script src="../js/config.js"></script>
    <script src="../js/products.js"></script>
    <script src="../js/app.js"></script>
    <script>
    let searchGroups = [];
    function onPageReady() {
        const params = new URLSearchParams(window.location.search);
        const q = params.get('q') || '';
        if (q) {
            document.getElementById('globalSearch').value = q;
            document.getElementById('searchTitle').textContent = `Резултати за „${q}"`;
        }
        document.getElementById('storeFilter').addEventListener('change', () => applySearchFilters(q));
        document.getElementById('sortSelect').addEventListener('change', () => applySearchFilters(q));
        doSearch(q);
    }
    async function doSearch(q) {
        const container = document.getElementById('searchResults');
        showLoading(container);
        const all = await fetchAllProducts();
        searchGroups = groupProducts(all);
        applySearchFilters(q);
    }
    function applySearchFilters(q) {
        const store = document.getElementById('storeFilter').value;
        const sort = document.getElementById('sortSelect').value;
        let results = filterGroups(searchGroups, { store, search: q });
        results = sortGroups(results, sort);
        document.getElementById('resultCount').textContent = results.length;
        renderProductsGrid(document.getElementById('searchResults'), results, currentCurrency, 'grid');
    }
    function onCurrencyChange() { const q = new URLSearchParams(window.location.search).get('q') || ''; applySearchFilters(q); }
    </script>
</body>
</html>
